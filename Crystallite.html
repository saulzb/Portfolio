<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saul Zidulka-Bejcek | Creatives</title>

<link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">

<style>
html, body {
  margin:0; padding:0; width:100%; height:100%;
  color:#eaeaea;
  background:#0a0a0c;
  font-family:'Michroma',sans-serif;
  scroll-behavior:smooth;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(10, 10, 12, 0.65);
  pointer-events: none;
  z-index: 1;
}

/* ---------------- SECTION ---------------- */
section {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  gap:40px;
  position: relative;
  z-index: 2;
  padding-top:80px;
}

/* ---------------- BACK ---------------- */
.back-home {
  position:absolute;
  top:30px;
  left:50%;
  transform:translateX(-50%);
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  font-size:0.75rem;
  color:rgba(204,204,204,0.5);
  text-decoration:none;
  z-index:10;
}
.back-home:hover { color:rgba(255,255,255,0.8); }

/* ---------------- PRISM ---------------- */
.prism {
  position:relative;
  width:280px;
  height:68px;
  overflow:hidden;
  clip-path: polygon(8% 0%,100% 0%,100% 100%,8% 100%,0% 50%);
  background:linear-gradient(135deg,rgba(255,255,255,0.16),rgba(255,255,255,0.04) 45%,rgba(255,255,255,0.1));
  border:1px solid rgba(255,255,255,0.25);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08),0 18px 36px rgba(0,0,0,0.75);
}

.prism::before {
  content:"";
  position:absolute;
  left:0; top:0;
  width:22px; height:100%;
  background:linear-gradient(to bottom,rgba(255,255,255,0.35),rgba(255,255,255,0.02));
  clip-path: polygon(0 50%,100% 0,100% 100%);
}

.inner-face-right {
  position:absolute;
  right:0; top:0;
  width:34px; height:100%;
  opacity:0.35;
  background:linear-gradient(to right,rgba(255,255,255,0.35),rgba(255,255,255,0.08),rgba(255,255,255,0));
  clip-path: polygon(0% 50%,100% 0%,100% 100%);
}

.inner-face-horizontal {
  position:absolute;
  left:-10%; top:46%;
  width:120%; height:18%;
  opacity:0.28;
  background:linear-gradient(to bottom,rgba(255,255,255,0.35),rgba(255,255,255,0.08),rgba(255,255,255,0));
  clip-path: polygon(0% 0%,100% 8%,100% 100%,0% 92%);
}

.prism-text {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:0.8rem;
  letter-spacing:0.32em;
  filter: blur(0.45px);
}

.prism-text span {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

.prism-r { color:#ff453a; transform:translateX(-3px); filter:blur(0.9px); }
.prism-o { color:#ff9f0a; transform:translateX(-2px); filter:blur(0.7px); }
.prism-y { color:#ffd60a; transform:translateX(-1px); filter:blur(0.6px); }
.prism-g { color:#32d74b; transform:translateX(1px);  filter:blur(0.6px); }
.prism-c { color:#64d2ff; transform:translateX(2px);  filter:blur(0.7px); }
.prism-b { color:#0a84ff; transform:translateX(3px);  filter:blur(0.9px); }

/* ---------------- DESCRIPTION ---------------- */
.prism-desc {
  margin-top:-20px;
  font-size:0.6rem;
  letter-spacing:0.4px;
  opacity:0;
  color:#ffffff;
  text-align:center;
  max-width:420px;
  line-height:1.4;
  transition:opacity 1.2s ease;
  padding:0 10px; /* default horizontal padding */
}
.prism-desc.visible { opacity:0.75; }

/* ---------------- GRID ---------------- */
.category-row {
  display:flex;
  flex-wrap:wrap;
  gap:40px;
  justify-content:center;
  max-width:1000px;
  margin:0 auto;
  opacity:0;
  animation:fadeIn 0.8s ease forwards;
}
@keyframes fadeIn { to { opacity:1; } }

#photoSections { padding-bottom:80px; }

.category-row img {
  flex:1 1 120px;
  max-width:180px;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:6px;
  box-shadow:0 8px 20px rgba(0,0,0,0.45);
  cursor:pointer;
  filter:blur(15px);
  opacity:0;
  position:relative;
  isolation:isolate;
  border:2px solid rgba(255,255,255,0.08);
  transition:opacity 0.6s ease, filter 0.6s ease;
}
.category-row img.loaded { filter:blur(0); opacity:1; }

/* ---------------- LIGHTBOX ---------------- */
.lightbox {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:none;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:opacity 0.35s ease;
  z-index:999;
}
.lightbox.show { display:flex; opacity:1; }

.lightbox-bg {
  position:absolute;
  inset:0;
  background-position:center;
  background-repeat:no-repeat;
  background-size:contain;
  filter:blur(28px);
  opacity:0.45;
  transform:scale(1.25);
}

.lightbox img {
  max-width:90vw;
  max-height:90vh;
  opacity:0;
  transition:opacity 0.35s ease;
}
.lightbox img.visible { opacity:1; }

.nav-mark {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:3rem;
  color:rgba(204,204,204,0.4);
  cursor:pointer;
}
.nav-left { left:20px; }
.nav-right { right:20px; }

/* ---------------- MOBILE ---------------- */
@media (max-width:768px){
  .prism-desc {
    font-size:0.52rem;       /* slightly larger on mobile */
    max-width:300px;
    margin-top:12px;         /* more space from prism title */
    padding:0 20px;          /* more horizontal padding for small screens */
  }
  .category-row img {
    flex: 1 1 calc(50% - 20px);
    max-width:140px;
  }
}
</style>
</head>

<body>

<section>
<a href="#" class="back-home" onclick="goHome(event)">Back to home</a>

<script>
function goHome(e){
  e.preventDefault();
  sessionStorage.setItem("returnToFolders","true");
  window.location.href="index.html";
}
</script>

<div class="prism">
  <div class="inner-face-right"></div>
  <div class="inner-face-horizontal"></div>
  <div class="prism-text">
    Creatives
    <span class="prism-r">Creatives</span>
    <span class="prism-o">Creatives</span>
    <span class="prism-y">Creatives</span>
    <span class="prism-g">Creatives</span>
    <span class="prism-c">Creatives</span>
    <span class="prism-b">Creatives</span>
  </div>
</div>

<div class="prism-desc" id="prismDesc">

</div>

<div id="photoSections"></div>
</section>

<div class="lightbox" id="lightbox">
<div class="lightbox-bg" id="lightbox-bg"></div>
<div class="nav-mark nav-left">◂</div>
<img id="lightbox-img">
<div class="nav-mark nav-right">▸</div>
</div>

<script>
window.addEventListener("load",()=>{
  setTimeout(()=>document.getElementById("prismDesc").classList.add("visible"),400);
});

const SPACE_ID='5w319pzc4eiq';
const ACCESS_TOKEN='l_S14vNHPLKqDVzZDxMSlO3g3AhMne9mAvyC74dyetg';
const CATEGORY_NAME="Crystallite";

let gallery=[];
let currentIndex=0;

async function fetchPhotos(){
  const res=await fetch(`https://cdn.contentful.com/spaces/${SPACE_ID}/entries?content_type=photo&access_token=${ACCESS_TOKEN}&include=1`);
  const data=await res.json();
  const assets={};
  data.includes.Asset.forEach(a=>assets[a.sys.id]=a.fields.file.url);

  gallery=data.items.filter(i=>i.fields.category===CATEGORY_NAME)
    .map(i=>`https:${assets[i.fields.photo.sys.id]}`);

  renderPhotos();
}

function renderPhotos(){
  const row=document.createElement("div");
  row.className="category-row";

  gallery.forEach((src,i)=>{
    const img=document.createElement("img");
    img.src=src;
    img.onload=()=>img.classList.add("loaded");
    img.onclick=()=>openLightbox(i);
    row.appendChild(img);
  });

  document.getElementById("photoSections").appendChild(row);
}

const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");

function openLightbox(i){
  currentIndex=i;
  lightbox.classList.add("show");
  showImage(i);
}

function showImage(i){
  currentIndex=i;
  lightboxImg.src=gallery[i];
  lightboxImg.classList.add("visible");
}

document.querySelector(".nav-right").onclick=()=>showImage((currentIndex+1)%gallery.length);
document.querySelector(".nav-left").onclick=()=>showImage((currentIndex-1+gallery.length)%gallery.length);

lightbox.onclick=()=>lightbox.classList.remove("show");

fetchPhotos();
</script>

</body>
</html>
