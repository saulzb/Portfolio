<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Saul Zidulka-Bejcek</title>

<link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,
body{
  width:100%;
  min-height:100%;
  max-width:100vw;
  overflow-x:hidden;

  font-family:'Michroma',sans-serif;
  background:#070803;
  color:#eee;

  scroll-snap-type:y mandatory;
  scroll-behavior:smooth;
}

/* ---------------- SECTIONS ---------------- */

section{
  width:100%;
  min-height:100svh;

  display:flex;
  justify-content:center;
  align-items:center;

  scroll-snap-align:start;

  position:relative;
  background:#070803;
}

/* ---------------- HERO ---------------- */

#hero{
  background:url('SaulHero5.jpg')
             center center/cover no-repeat;
}

@media (max-width:768px){

  #hero{
    background:url('SAULZIDULKABEJCEK-3.jpg')
               center center/cover no-repeat;
  }
}

/* ---------------- GRID ---------------- */

.folder-grid{
  display:flex;
  flex-direction:column;
  gap:80px;
  align-items:center;
  width:100%;
  padding:40px;
}

.folder-row{
  display:flex;
  gap:80px;
  justify-content:center;
  width:100%;
}

/* ---------------- FOLDERS ---------------- */

.folder{
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  position:relative;
}

.folder-stack{
  position:relative;
  width:144px;
  height:64px;

  transition:
    transform .4s ease,
    opacity .4s ease;
}

.folder:hover .folder-stack{
  transform:translateY(-3px);
}

.folder-main{
  position:absolute;
  right:0;
  top:0;

  width:88px;
  height:64px;

  background:#e4c97a;
  border-radius:3px;

  box-shadow:2px 2px 0 #000;
  z-index:10;
}

.folder-tab{
  position:absolute;
  top:-8px;
  left:8px;

  width:32px;
  height:12px;

  background:#e4c97a;
  border-radius:2px;
}

.trail{
  position:absolute;
  top:0;

  width:88px;
  height:64px;
  border-radius:3px;
}

.trail.t1{right:12px;background:#c9a84a;}
.trail.t2{right:26px;background:#9b5c5c;}
.trail.t3{right:40px;background:#6e7f52;}
.trail.t4{right:54px;background:#5a6b8c;}

.folder span{
  margin-top:16px;
  width:144px;

  text-align:center;
  font-size:.7rem;
  line-height:1.5;
}

.photo-count{
  font-size:.65rem;
  opacity:.7;
  margin-top:6px;
}

/* ---------------- CONTACT ---------------- */

.contact-icons{
  display:flex;
  gap:70px;
  justify-content:center;
  align-items:center;
}

.icon{
  transition:transform .3s ease;
}

.icon:hover{
  transform:translateY(-3px);
}

.icon svg{
  width:38px;
  height:38px;

  stroke:#eee;
  fill:none;

  stroke-width:1.5;
  stroke-linecap:round;
  stroke-linejoin:round;
}

/* ---------------- MOBILE ---------------- */

@media (max-width:768px){

  .folder-row{
    flex-wrap:wrap;
    gap:40px;
  }

  .contact-icons{
    gap:40px;
  }
}

</style>
</head>

<body>

<!-- HERO -->

<section id="hero"></section>

<!-- FOLDERS -->

<section id="folders">

  <div class="folder-grid">

    <div class="folder-row" id="topRow"></div>

    <div class="folder-row" id="bottomRow"></div>

  </div>

</section>

<!-- CONTACT -->

<section id="contact">

  <div class="contact-icons">

    <!-- Instagram -->

    <a class="icon"
       href="https://instagram.com/YOUR_ACCOUNT"
       target="_blank">

      <svg viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="5"></rect>
        <circle cx="12" cy="12" r="4"></circle>
        <circle cx="17.5" cy="6.5" r="1"></circle>
      </svg>

    </a>

    <!-- Email -->

    <a class="icon"
       href="mailto:your@email.com">

      <svg viewBox="0 0 24 24">
        <path d="M4 6h16v12H4z"></path>
        <path d="M4 7l8 6 8-6"></path>
      </svg>

    </a>

    <!-- Facebook -->

    <a class="icon"
       href="https://facebook.com/YOUR_ACCOUNT"
       target="_blank">

      <svg viewBox="0 0 24 24">
        <path d="M14 8h3V4h-3c-3 0-5 2-5 5v3H6v4h3v4h4v-4h3l1-4h-4V9c0-.6.4-1 1-1z"/>
      </svg>

    </a>

  </div>

</section>

<script>

/* ---------------- FOLDER DATA ---------------- */

const categories = [

  {
    label:"Yukon 2026",
    page:"yukon-wildlife.html",
    count:164
  },

  {
    label:"Wildlife + Adventure",
    page:"raw-pnw.html",
    count:231
  },

  {
    label:"Double Exposures",
    page:"DoubleExpo.html",
    count:42
  },

  {
    label:"Creatives",
    page:"crystallite.html",
    count:58
  }

];

/* ---------------- BUILD ---------------- */

const topRow =
document.getElementById("topRow");

const bottomRow =
document.getElementById("bottomRow");

categories.forEach((cat,index)=>{

  const folder =
  document.createElement("div");

  folder.className="folder";

  folder.innerHTML=`

    <div class="folder-stack">

      <div class="trail t4"></div>
      <div class="trail t3"></div>
      <div class="trail t2"></div>
      <div class="trail t1"></div>

      <div class="folder-main">
        <div class="folder-tab"></div>
      </div>

    </div>

    <span>${cat.label}</span>

    <div class="photo-count">
      ${cat.count} Images
    </div>

  `;

  folder.onclick=()=>{
    location.href=cat.page;
  };

  if(index < 2){
    topRow.appendChild(folder);
  }else{
    bottomRow.appendChild(folder);
  }

});

</script>

</body>
</html>
