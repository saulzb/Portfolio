<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- 🎯 THE VIEWPORT FIX:
     Adding 'viewport-fit=cover' forces the browser window to stretch cleanly underneath 
     any native webview boundaries. Setting explicit minimum and maximum scales to 1.0 
     forces the layout engine to align perfectly on its sub-pixel grid, eliminating 
     the rounding error that causes that white edge line.
-->
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover">

<title>Saul Zidulka-Bejcek</title>

<link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">

<style>

* {
  box-sizing:border-box;
  margin:0;
  padding:0;
} perfume

/* ---------------- BASE ---------------- */

html, body {
  width:100%;
  height:100%;
  font-family:'Michroma', sans-serif;
  background:#070803;
  color:#eee;

  overflow-x:hidden;

  scroll-snap-type:y mandatory;
  scroll-behavior:smooth;
}

/* ---------------- SECTIONS ---------------- */

section {
  width:100%;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  scroll-snap-align:start;

  position:relative;
  background:#070803;
}

/* ---------------- HERO ---------------- */

#hero {
  background:url('SaulHero5.jpg') center/cover no-repeat;
}

@media (max-width:768px){
  #hero {
    background:url('SAULZIDULKABEJCEK-3.jpg') center/cover no-repeat;
  }
}

/* ---------------- GRID ---------------- */

.folder-grid {
  display:flex;
  flex-direction:column;
  gap:80px;
  align-items:center;
}

.folder-row {
  display:flex;
  gap:80px;
  justify-content:center;
  width:100%;
}

/* ---------------- FOLDERS ---------------- */

.folder {
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  position:relative;
}

.folder-stack {
  position:relative;
  width:144px;
  height:64px;

  transition: transform 0.4s ease, opacity 0.4s ease;
}

.folder:hover .folder-stack {
  transform:translateY(-3px);
}

.folder-main {
  position:absolute;
  right:0;
  top:0;

  width:88px;
  height:64px;

  background:#e4c97a;
  border-radius:3px;

  box-shadow:2px 2px 0 #000;
  z-index:10;
}

.folder-tab {
  position:absolute;
  top:-8px;
  left:8px;

  width:32px;
  height:12px;

  background:#e4c97a;
  border-radius:2px;
}

.trail {
  position:absolute;
  top:0;

  width:88px;
  height:64px;

  border-radius:3px;
}

.trail.t1 { right:12px; background:#c9a84a; }
.trail.t2 { right:26px; background:#9b5c5c; }
.trail.t3 { right:40px; background:#6e7f52; }
.trail.t4 { right:54px; background:#5a6b8c; }

.folder span {
  margin-top:16px;
  width:144px;

  text-align:center;
  font-size:0.7rem;
  line-height:1.5;
}

/* ---------------- CONTACT ---------------- */

.contact-icons {
  display:flex;
  gap:80px;
  justify-content:center;
  align-items:center;
}

.icon {
  color:#eee;
  font-size:36px;
  transition:0.3s ease;
}

.icon:hover {
  transform:translateY(-3px);
  opacity:0.8;
}

/* ---------------- MOBILE ---------------- */

@media (max-width:768px){

  .folder-row {
    flex-wrap:wrap;
    gap:40px;
  }
}

</style>
</head>

<body>

<!-- HERO -->
<section id="hero"></section>

<!-- FOLDERS -->
<section id="folders">

  <div class="folder-grid">

    <div class="folder-row" id="topRow"></div>
    <div class="folder-row" id="bottomRow"></div>

  </div>

</section>
  
<!-- CONTACT -->
<section id="contact">

  <div class="contact-icons">

    <a class="icon" href="https://instagram.com/saul_5607" target="_blank">
      <i class="fa-brands fa-instagram"></i>
    </a>

    <a class="icon" href="mailto:saulzb@hotmail.com">
      <i class="fa-regular fa-envelope"></i>
    </a>

    <a class="icon"
       href="https://www.linkedin.com/in/saul-zidulka-bejcek-b700692b6/"
       target="_blank"
       rel="noopener noreferrer">
      <i class="fa-brands fa-linkedin"></i>
    </a>

  </div>

</section>

<!-- FOLDER SCRIPT -->
<script>

const categories = [
  { label:"Yukon 2026", page:"yukon-wildlife.html" },
  { label:"Wildlife + Adventure", page:"raw-pnw.html" },
  { label:"Double Exposures", page:"DoubleExpo.html" },
  { label:"Creatives", page:"crystallite.html" }
];

const topRow = document.getElementById("topRow");
const bottomRow = document.getElementById("bottomRow");

categories.forEach((cat,index)=>{

  const folder = document.createElement("div");
  folder.className="folder";

  folder.innerHTML=`

    <div class="folder-stack">

      <div class="trail t4"></div>
      <div class="trail t3"></div>
      <div class="trail t2"></div>
      <div class="trail t1"></div>

      <div class="folder-main">
        <div class="folder-tab"></div>
      </div>

    </div>

    <span>${cat.label}</span>

  `;

  folder.onclick=()=>{
    location.href=cat.page;
  };

  if(index < 2){
    topRow.appendChild(folder);
  } else {
    bottomRow.appendChild(folder);
  }

});

</script>

<!-- ICON LIBRARY -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</body>
</html>
