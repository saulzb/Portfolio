<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saul Zidulka-Bejcek</title>

<link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">

<style>
* { box-sizing:border-box; margin:0; padding:0; }

html, body {
  width: 100%;
  height: 100%;
  font-family: 'Michroma', sans-serif;
  background: #070803;
  color: #eee;
  overflow-x: hidden;
  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
}

section {
  width: 100%;
  height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  scroll-snap-align:start;
  position: relative;
}

/* HERO */
#hero {
  background: url('SaulHero5.jpg') center/cover no-repeat;
}

/* ARROWS */
.arrow-down {
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:40px;
  font-size:1.2rem;
  color: rgba(255,255,255,0.85);
  cursor:pointer;
}

/* GRID */
.folder-grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:80px;
  max-width:900px;
  padding:0 60px;
  justify-items:center;
}

/* Yukon centered */
.folder-grid .folder:first-child {
  grid-column: 1 / -1;
  justify-self: center;
}

.folder {
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  position: relative;
}

/* folder base */
.folder-stack { position: relative; width:144px; height:64px; }
.folder-main {
  position:absolute;
  right:0;
  top:0;
  width:88px;
  height:64px;
  background:#e4c97a;
  border-radius:3px;
  box-shadow:2px 2px 0 #000;
  z-index:10;
}
.folder-tab {
  position:absolute;
  top:-8px;
  left:8px;
  width:32px;
  height:12px;
  background:#e4c97a;
  border-radius:2px;
}
.trail { position:absolute; top:0; width:88px; height:64px; border-radius:3px; }
.trail.t1 { right:12px; background:#c9a84a; }
.trail.t2 { right:26px; background:#9b5c5c; }
.trail.t3 { right:40px; background:#6e7f52; }
.trail.t4 { right:54px; background:#5a6b8c; }

.folder span {
  margin-top:16px;
  width:144px;
  text-align:center;
  font-size:0.7rem;
}

.photo-count {
  font-size:0.6rem;
  opacity:0.6;
  margin-top:2px;
}

/* ---------------- YUKON MENU ---------------- */
.yukon-folder { position: relative; }

.yukon-menu {
  position:absolute;
  top:50%;
  left:50%;
  transform: translate(-50%, -40%) scale(0.85);
  width:260px;
  padding:18px;
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:12px;

  background: rgba(20,20,20,0.95);
  backdrop-filter: blur(6px);
  border-radius:12px;

  opacity:0;
  pointer-events:none;
  transition:0.3s ease;
  z-index:50;
}

.yukon-folder:hover .yukon-menu {
  opacity:1;
  transform: translate(-50%, -50%) scale(1);
  pointer-events:auto;
}

.yukon-folder.open .yukon-menu {
  opacity:1;
  transform: translate(-50%, -50%) scale(1);
  pointer-events:auto;
}

/* submenu items */
.yukon-item {
  padding:10px;
  font-size:0.65rem;
  text-align:center;
  border-radius:6px;
  cursor:pointer;
  color:#000;
  transition: transform 0.2s ease, filter 0.2s ease;
}

.yukon-item:hover {
  transform: translateY(-2px);
  filter: brightness(1.1);
}

/* COLOURS (your folder palette) */
.yukon-item.wildlife { background:#c9a84a; }
.yukon-item.landscapes { background:#9b5c5c; }
.yukon-item.drawings { background:#6e7f52; }
.yukon-item.creatives { background:#5a6b8c; }

/* fade folder when open */
.yukon-folder.open .folder-stack {
  opacity:0.25;
}

/* MOBILE */
@media (max-width:768px){
  .folder-grid {
    grid-template-columns: repeat(2,1fr);
    gap:48px 24px;
    padding:0 24px;
  }

  .folder-grid .folder:first-child {
    grid-column:auto;
  }

  .folder { transform: scale(0.85); }
}
</style>
</head>

<body>

<section id="hero">
  <div class="arrow-down">↓</div>
</section>

<section id="folders">
  <div class="folder-grid" id="folderGrid"></div>
</section>

<script>
const categories = [
  { label:"Summer 2026 - Yukon", page:"Yukon2026.html", contentName:"Summer-2026" },
  { label:"Wildlife + Adventure", page:"raw-pnw.html", contentName:"Raw PNW" },
  { label:"Double Exposures", page:"DoubleExpo.html", contentName:"Double-Expo" },
  { label:"Creatives", page:"crystallite.html", contentName:"Crystallite" },
];

function renderFolders(){
  const grid = document.getElementById("folderGrid");

  categories.forEach(cat => {

    const folder = document.createElement("div");
    folder.className = "folder";

    const isYukon = cat.label.includes("Yukon");

    if(isYukon){
      folder.classList.add("yukon-folder");
    }

    folder.innerHTML = `
      <div class="folder-stack">
        <div class="trail t4"></div>
        <div class="trail t3"></div>
        <div class="trail t2"></div>
        <div class="trail t1"></div>
        <div class="folder-main">
          <div class="folder-tab"></div>
        </div>
      </div>

      ${isYukon ? `
        <div class="yukon-menu">
          <div class="yukon-item wildlife" onclick="location.href='yukon-wildlife.html'">Wildlife</div>
          <div class="yukon-item landscapes" onclick="location.href='yukon-landscapes.html'">Landscapes</div>
          <div class="yukon-item drawings" onclick="location.href='yukon-drawings.html'">Drawings</div>
          <div class="yukon-item creatives" onclick="location.href='yukon-creatives.html'">Creatives</div>
        </div>
      ` : ''}

      <span>${cat.label}</span>
      <div class="photo-count">Gallery</div>
    `;

    folder.onclick = (e) => {
      if(isYukon){
        e.stopPropagation();
        folder.classList.toggle("open");
      } else {
        location.href = cat.page;
      }
    };

    grid.appendChild(folder);
  });
}

renderFolders();

/* close Yukon menu when clicking outside */
document.addEventListener("click", () => {
  document.querySelectorAll(".yukon-folder").forEach(f => f.classList.remove("open"));
});
</script>

</body>
</html>
