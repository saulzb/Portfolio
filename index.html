<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saul Zidulka-Bejcek</title>

<link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">

<style>
* { box-sizing:border-box; margin:0; padding:0; }

html, body {
  width: 100%;
  height: 100%;
  font-family: 'Michroma', sans-serif;
  background: #070803;
  color: #eee;
  overflow-x: hidden;
  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
}

section {
  width: 100%;
  height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  scroll-snap-align:start;
  scroll-snap-stop: always;
  position: relative;
}

/* HERO */
#hero {
  background: url('SaulHero5.jpg') center/cover no-repeat;
}

/* ARROWS */
.arrow-down {
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:40px;
  font-size:1.2rem;
  color: rgba(255,255,255,0.85);
  cursor:pointer;
  transition: opacity 1.5s ease;
}

.arrow-fade { opacity:0; pointer-events:none; }
.arrow-visible { opacity:0.75; }

/* GRID */
.folder-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:80px;
  max-width:900px;
  padding:0 60px;
  justify-items:center;
}

.folder {
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  position: relative;
}

.folder.empty { opacity:0.6; }

.folder-stack {
  position: relative;
  width:144px;
  height:64px;
}

.folder-main {
  position: absolute;
  right:0;
  top:0;
  width:88px;
  height:64px;
  background:#e4c97a;
  border-radius:3px;
  box-shadow:2px 2px 0 #000;
  z-index:10;
}

.folder-tab {
  position:absolute;
  top:-8px;
  left:8px;
  width:32px;
  height:12px;
  background:#e4c97a;
  border-radius:2px;
  box-shadow:1px 1px 0 #000;
}

.trail { position:absolute; top:0; width:88px; height:64px; border-radius:3px; }
.trail.t1 { right:12px; background:#c9a84a; z-index:6; }
.trail.t2 { right:26px; background:#9b5c5c; z-index:5; }
.trail.t3 { right:40px; background:#6e7f52; z-index:4; }
.trail.t4 { right:54px; background:#5a6b8c; z-index:3; }

.folder span {
  margin-top:16px;
  width:144px;
  text-align:center;
  font-size:0.7rem;
  opacity:0.85;
}

.photo-count {
  font-size:0.6rem;
  opacity:0.6;
  margin-top:2px;
}

/* PREVIEW */
.folder-preview {
  position:absolute;
  width:88px;
  height:64px;
  object-fit:cover;
  border-radius:3px 3px 0 0;
  top:-20px;
  right:0;
  opacity:0;
  transition:0.3s;
  z-index:15;
}

.folder:hover .folder-preview { opacity:1; }

/* CONTACT */
.contact-icons { display:flex; gap:80px; }

/* MOBILE */
@media (max-width:768px){
  #hero { background:url('SAULZIDULKABEJCEK-3.jpg') center/cover no-repeat; }
  .folder-grid { grid-template-columns: repeat(2,1fr); gap:48px 24px; padding:0 24px; }
  .folder { transform: scale(0.85); }
  .folder-preview { display:none; }
}
</style>
</head>

<body>

<section id="hero">
  <div class="arrow-down" id="heroDown">↓</div>
</section>

<section id="folders">
  <div class="folder-grid" id="folderGrid"></div>
  <div class="arrow-down arrow-fade" id="foldersDown">↓</div>
</section>

<section id="contact">
  <div class="contact-icons">
    <a href="https://www.linkedin.com" target="_blank">LinkedIn</a>
    <a href="https://www.instagram.com" target="_blank">Instagram</a>
    <a href="mailto:your@email.com">Email</a>
  </div>
</section>

<script>
const SPACE_ID = '5w319pzc4eiq';
const ACCESS_TOKEN = 'l_S14vNHPLKqDVzZDxMSlO3g3AhMne9mAvyC74dyetg';

const categories = [
  { label: "Summer 2026 - Yukon", page: "Yukon2026.html", contentName:"Summer-2026" },
  { label: "Wildlife + Adventure", page: "raw-pnw.html", contentName:"Raw PNW" },
  { label: "Double Exposures", page: "DoubleExpo.html", contentName:"Double-Expo" },
  { label: "Creatives", page: "crystallite.html", contentName:"Crystallite" },
];

async function fetchPhotos(categoryName){
  const res = await fetch(
    `https://cdn.contentful.com/spaces/${SPACE_ID}/entries?content_type=photo&access_token=${ACCESS_TOKEN}&include=1`
  );
  const data = await res.json();

  const assets = {};
  data.includes.Asset.forEach(a => assets[a.sys.id] = a.fields.file.url);

  return data.items
    .filter(i => i.fields.category === categoryName)
    .map(i => `https:${assets[i.fields.photo.sys.id]}`);
}

async function renderFolders(){
  const grid = document.getElementById("folderGrid");

  for(const cat of categories){
    const photos = await fetchPhotos(cat.contentName);

    const folder = document.createElement("div");
    folder.className = "folder";

    if (photos.length === 0) {
      folder.classList.add("empty");
    }

    const previews = photos.length > 0
      ? photos.slice(0,3).map(url=>{
          const rotate = Math.floor(Math.random()*10-5);
          return `<img src="${url}?w=88&h=64&fm=webp&q=85"
                  class="folder-preview"
                  style="transform: rotate(${rotate}deg);">`;
        }).join('')
      : `<div class="folder-preview" style="opacity:0.15; background:#aaa;"></div>`;

    folder.innerHTML = `
      <div class="folder-stack">
        <div class="trail t4"></div>
        <div class="trail t3"></div>
        <div class="trail t2"></div>
        <div class="trail t1"></div>
        <div class="folder-main">
          <div class="folder-tab"></div>
        </div>
        ${previews}
      </div>
      <span>${cat.label}</span>
      <div class="photo-count">
        ${photos.length > 0 ? `${photos.length} photos` : "Coming soon"}
      </div>
    `;

    folder.onclick = () => {
      window.location.href = cat.page;
    };

    grid.appendChild(folder);
  }
}

renderFolders();

/* ARROWS */
document.getElementById("heroDown").onclick = () => {
  document.getElementById("folders").scrollIntoView();
};

document.getElementById("foldersDown").onclick = () => {
  document.getElementById("contact").scrollIntoView();
};

setTimeout(() => {
  document.getElementById("foldersDown").classList.add("arrow-visible");
}, 3000);
</script>

</body>
</html>
