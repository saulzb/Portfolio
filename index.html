<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saul Zidulka-Bejcek</title>

<link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">

<style>
* { box-sizing:border-box; margin:0; padding:0; }

/* ---------------- BASE ---------------- */
html, body {
  width: 100%;
  height: 100%;
  font-family: 'Michroma', sans-serif;
  background: #070803;
  color: #eee;
  overflow-x: hidden;

  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
}

section {
  width: 100%;
  height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  scroll-snap-align:start;
  position: relative;
  background:#070803;
}

/* ---------------- HERO ---------------- */
#hero {
  background: url('SaulHero5.jpg') center/cover no-repeat;
}

@media (max-width:768px){
  #hero {
    background:url('SAULZIDULKABEJCEK-3.jpg') center/cover no-repeat;
  }
}

/* ---------------- GRID ---------------- */
.folder-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:80px;
  max-width:900px;
  padding:0 60px;
  justify-items:center;
  transition: transform 0.4s ease;
}

/* push other folders down when Yukon expands */
.folder-grid.yukon-open .folder:not(.yukon-folder) {
  transform: translateY(60px);
}

/* ---------------- FOLDER BASE ---------------- */
.folder {
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  position: relative;
}

.folder-stack {
  position: relative;
  width:144px;
  height:64px;
  transition: transform 0.4s ease, opacity 0.4s ease;
}

.folder-main {
  position:absolute;
  right:0;
  top:0;
  width:88px;
  height:64px;
  background:#e4c97a;
  border-radius:3px;
  box-shadow:2px 2px 0 #000;
  z-index:10;
}

.folder-tab {
  position:absolute;
  top:-8px;
  left:8px;
  width:32px;
  height:12px;
  background:#e4c97a;
  border-radius:2px;
}

.trail { position:absolute; top:0; width:88px; height:64px; border-radius:3px; }
.trail.t1 { right:12px; background:#c9a84a; }
.trail.t2 { right:26px; background:#9b5c5c; }
.trail.t3 { right:40px; background:#6e7f52; }
.trail.t4 { right:54px; background:#5a6b8c; }

.folder span {
  margin-top:16px;
  width:144px;
  text-align:center;
  font-size:0.7rem;
}

.photo-count {
  font-size:0.6rem;
  opacity:0.6;
  margin-top:2px;
}

/* ---------------- YUKON EXPANSION SYSTEM ---------------- */
.yukon-folder {
  position: relative;
  z-index: 20;
}

/* stack pulls right */
.yukon-folder.open .folder-stack,
.yukon-folder:hover .folder-stack {
  transform: translateX(40px);
  opacity: 0.6;
}

/* container for spawned folders */
.yukon-menu {
  position:absolute;
  left: 160px;
  top: 0;

  display:flex;
  flex-direction:column;
  gap:12px;

  pointer-events:none;
}

/* individual dropped folders */
.yukon-item {
  width:130px;
  height:64px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:0.65rem;
  border-radius:6px;
  color:#000;

  cursor:pointer;

  opacity:0;
  transform:translateX(-50px) scale(0.95);

  transition: all 0.35s ease;
}

/* colors */
.wildlife { background:#c9a84a; }
.landscapes { background:#9b5c5c; }
.drawings { background:#6e7f52; }
.creatives { background:#5a6b8c; }

/* OPEN STATE */
.yukon-folder.open .yukon-item,
.yukon-folder:hover .yukon-item {
  opacity:1;
  transform:translateX(0) scale(1);
  pointer-events:auto;
}

/* staggered DROP animation */
.yukon-folder.open .yukon-item:nth-child(1),
.yukon-folder:hover .yukon-item:nth-child(1) { transition-delay:0ms; }

.yukon-folder.open .yukon-item:nth-child(2),
.yukon-folder:hover .yukon-item:nth-child(2) { transition-delay:120ms; }

.yukon-folder.open .yukon-item:nth-child(3),
.yukon-folder:hover .yukon-item:nth-child(3) { transition-delay:240ms; }

.yukon-folder.open .yukon-item:nth-child(4),
.yukon-folder:hover .yukon-item:nth-child(4) { transition-delay:360ms; }

/* ---------------- CONTACT ---------------- */
.contact-icons {
  display:flex;
  gap:80px;
  justify-content:center;
  align-items:center;
}

.icon svg {
  width:36px;
  height:36px;
  stroke:#eee;
  fill:none;
  stroke-width:1.4;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.icon {
  animation:breathe 6s ease-in-out infinite;
}

.icon:nth-child(2) { animation-delay:1.2s; }
.icon:nth-child(3) { animation-delay:2.4s; }

@keyframes breathe {
  0% { transform:scale(1); opacity:0.85; }
  50% { transform:scale(1.05); opacity:1; }
  100% { transform:scale(1); opacity:0.85; }
}

/* ---------------- MOBILE ---------------- */
@media (max-width:768px){
  .folder-grid {
    grid-template-columns: repeat(2,1fr);
    gap:48px 24px;
    padding:0 24px;
  }

  .folder { transform:scale(0.85); }
}
</style>
</head>

<body>

<!-- HERO -->
<section id="hero"></section>

<!-- FOLDERS -->
<section id="folders">
  <div class="folder-grid" id="folderGrid"></div>
</section>

<!-- CONTACT -->
<section id="contact">
  <div class="contact-icons">

    <a href="https://www.linkedin.com/in/saul-zidulka-bejcek-b700692b6/" target="_blank" class="icon">
      <svg viewBox="0 0 24 24">
        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/>
        <rect x="2" y="9" width="4" height="12"/>
        <circle cx="4" cy="4" r="2"/>
      </svg>
    </a>

    <a href="https://www.instagram.com/saul_5607/" target="_blank" class="icon">
      <svg viewBox="0 0 24 24">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="1"/>
      </svg>
    </a>

    <a href="mailto:saulzb@hotmail.com" class="icon">
      <svg viewBox="0 0 24 24">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <polyline points="2,6 12,13 22,6"/>
      </svg>
    </a>

  </div>
</section>

<script>
const categories = [
  { label:"Summer 2026 - Yukon", page:"Yukon2026.html" },
  { label:"Wildlife + Adventure", page:"raw-pnw.html" },
  { label:"Double Exposures", page:"DoubleExpo.html" },
  { label:"Creatives", page:"crystallite.html" }
];

const grid = document.getElementById("folderGrid");

categories.forEach(cat => {

  const isYukon = cat.label.includes("Yukon");

  const folder = document.createElement("div");
  folder.className = "folder";

  if(isYukon) folder.classList.add("yukon-folder");

  folder.innerHTML = `
    <div class="folder-stack">
      <div class="trail t4"></div>
      <div class="trail t3"></div>
      <div class="trail t2"></div>
      <div class="trail t1"></div>
      <div class="folder-main">
        <div class="folder-tab"></div>
      </div>
    </div>

    ${isYukon ? `
    <div class="yukon-menu">
      <div class="yukon-item wildlife" onclick="location.href='yukon-wildlife.html'">Wildlife</div>
      <div class="yukon-item landscapes" onclick="location.href='yukon-landscapes.html'">Landscapes</div>
      <div class="yukon-item drawings" onclick="location.href='yukon-drawings.html'">Drawings</div>
      <div class="yukon-item creatives" onclick="location.href='yukon-creatives.html'">Creatives</div>
    </div>
    ` : ''}

    <span>${cat.label}</span>
    <div class="photo-count">Gallery</div>
  `;

  folder.onclick = (e) => {
    if(isYukon){
      e.stopPropagation();

      const wasOpen = folder.classList.contains("open");

      document.querySelectorAll(".yukon-folder").forEach(f => f.classList.remove("open"));
      document.querySelector(".folder-grid").classList.remove("yukon-open");

      if(!wasOpen){
        folder.classList.add("open");
        document.querySelector(".folder-grid").classList.add("yukon-open");
      }

    } else {
      location.href = cat.page;
    }
  };

  grid.appendChild(folder);
});

/* click outside closes */
document.addEventListener("click", () => {
  document.querySelectorAll(".yukon-folder").forEach(f => f.classList.remove("open"));
  document.querySelector(".folder-grid").classList.remove("yukon-open");
});
</script>

</body>
</html>
