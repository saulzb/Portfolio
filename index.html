<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saul Zidulka-Bejcek</title>

<link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">

<style>
* { box-sizing:border-box; margin:0; padding:0; }

/* ---------------- BASE ---------------- */
html, body {
  width: 100%;
  height: 100%;
  font-family: 'Michroma', sans-serif;
  background: #070803;
  color: #eee;
  overflow-x: hidden;

  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
}

section {
  width: 100%;
  height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  scroll-snap-align:start;
  position: relative;
  background:#070803;
}

/* ---------------- HERO ---------------- */
#hero {
  background: url('SaulHero5.jpg') center/cover no-repeat;
}

@media (max-width:768px){
  #hero {
    background:url('SAULZIDULKABEJCEK-3.jpg') center/cover no-repeat;
  }
}

/* ---------------- GRID (2 ROWS) ---------------- */
.folder-grid {
  display:flex;
  flex-direction:column;
  gap:80px;
  align-items:center;
}

.folder-row {
  display:flex;
  gap:80px;
  justify-content:center;
  width:100%;
}

/* ---------------- FOLDERS ---------------- */
.folder {
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  position: relative;
}

.folder-stack {
  position: relative;
  width:144px;
  height:64px;
  transition: transform 0.4s ease, opacity 0.4s ease;
}

.folder-main {
  position:absolute;
  right:0;
  top:0;
  width:88px;
  height:64px;
  background:#e4c97a;
  border-radius:3px;
  box-shadow:2px 2px 0 #000;
  z-index:10;
}

.folder-tab {
  position:absolute;
  top:-8px;
  left:8px;
  width:32px;
  height:12px;
  background:#e4c97a;
  border-radius:2px;
}

.trail { position:absolute; top:0; width:88px; height:64px; border-radius:3px; }
.trail.t1 { right:12px; background:#c9a84a; }
.trail.t2 { right:26px; background:#9b5c5c; }
.trail.t3 { right:40px; background:#6e7f52; }
.trail.t4 { right:54px; background:#5a6b8c; }

.folder span {
  margin-top:16px;
  width:144px;
  text-align:center;
  font-size:0.7rem;
}

.photo-count {
  font-size:0.6rem;
  opacity:0.6;
  margin-top:2px;
}

/* ---------------- YUKON SPECIAL SYSTEM ---------------- */
.yukon-folder {
  position: relative;
  z-index: 50;
}

/* stack pulls right */
.yukon-folder.open .folder-stack,
.yukon-folder:hover .folder-stack {
  transform: translateX(120px);
  opacity: 0.6;
}

/* released folder container */
.yukon-release {
  position:absolute;
  left:160px;
  top:0;

  display:flex;
  gap:14px;
}

/* released folder items */
.yukon-release-item {
  width:120px;
  height:64px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:0.65rem;
  border-radius:6px;
  color:#000;
  cursor:pointer;

  opacity:0;
  transform:translateX(-40px);

  transition: all 0.35s ease;
}

/* colors */
.wildlife { background:#c9a84a; }
.landscapes { background:#9b5c5c; }
.drawings { background:#6e7f52; }
.creatives { background:#5a6b8c; }

/* reveal */
.yukon-folder.open .yukon-release-item,
.yukon-folder:hover .yukon-release-item {
  opacity:1;
  transform:translateX(0);
  pointer-events:auto;
}

/* sequential “drop off” */
.yukon-folder.open .yukon-release-item:nth-child(1),
.yukon-folder:hover .yukon-release-item:nth-child(1) { transition-delay:0ms; }

.yukon-folder.open .yukon-release-item:nth-child(2),
.yukon-folder:hover .yukon-release-item:nth-child(2) { transition-delay:120ms; }

.yukon-folder.open .yukon-release-item:nth-child(3),
.yukon-folder:hover .yukon-release-item:nth-child(3) { transition-delay:240ms; }

.yukon-folder.open .yukon-release-item:nth-child(4),
.yukon-folder:hover .yukon-release-item:nth-child(4) { transition-delay:360ms; }

/* ---------------- CONTACT ---------------- */
.contact-icons {
  display:flex;
  gap:80px;
  justify-content:center;
  align-items:center;
}

.icon svg {
  width:36px;
  height:36px;
  stroke:#eee;
  fill:none;
  stroke-width:1.4;
  stroke-linecap:round;
  stroke-linejoin:round;
}

/* ---------------- MOBILE ---------------- */
@media (max-width:768px){
  .folder-row {
    flex-wrap:wrap;
    gap:40px;
  }
}
</style>
</head>

<body>

<!-- HERO -->
<section id="hero"></section>

<!-- FOLDERS -->
<section id="folders">
  <div class="folder-grid">
    <div class="folder-row top" id="topRow"></div>
    <div class="folder-row bottom" id="bottomRow"></div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <div class="contact-icons"></div>
</section>

<script>
const categories = [
  { label:"Summer 2026 - Yukon", page:"Yukon2026.html" },
  { label:"Wildlife + Adventure", page:"raw-pnw.html" },
  { label:"Double Exposures", page:"DoubleExpo.html" },
  { label:"Creatives", page:"crystallite.html" }
];

const topRow = document.getElementById("topRow");
const bottomRow = document.getElementById("bottomRow");

categories.forEach(cat => {

  const isYukon = cat.label.includes("Yukon");

  const folder = document.createElement("div");
  folder.className = "folder";

  if(isYukon) folder.classList.add("yukon-folder");

  folder.innerHTML = `
    <div class="folder-stack">
      <div class="trail t4"></div>
      <div class="trail t3"></div>
      <div class="trail t2"></div>
      <div class="trail t1"></div>
      <div class="folder-main">
        <div class="folder-tab"></div>
      </div>
    </div>

    ${isYukon ? `
    <div class="yukon-release">
      <div class="yukon-release-item wildlife" onclick="location.href='yukon-wildlife.html'">Wildlife</div>
      <div class="yukon-release-item landscapes" onclick="location.href='yukon-landscapes.html'">Landscapes</div>
      <div class="yukon-release-item drawings" onclick="location.href='yukon-drawings.html'">Drawings</div>
      <div class="yukon-release-item creatives" onclick="location.href='yukon-creatives.html'">Creatives</div>
    </div>
    ` : ''}

    <span>${cat.label}</span>
    <div class="photo-count">Gallery</div>
  `;

  folder.onclick = (e) => {

    if(isYukon){
      e.stopPropagation();

      const wasOpen = folder.classList.contains("open");

      document.querySelectorAll(".yukon-folder").forEach(f => f.classList.remove("open"));

      if(!wasOpen){
        folder.classList.add("open");
      }

    } else {
      location.href = cat.page;
    }
  };

  if(isYukon) topRow.appendChild(folder);
  else bottomRow.appendChild(folder);
});

/* click outside closes */
document.addEventListener("click", () => {
  document.querySelectorAll(".yukon-folder").forEach(f => f.classList.remove("open"));
});
</script>

</body>
</html>
