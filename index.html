<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saul Zidulka-Bejcek</title>

<link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">

<style>
* {
  box-sizing:border-box;
  margin:0;
  padding:0;
}

/* ---------------- BASE ---------------- */

html, body {
  width:100%;
  height:100%;
  font-family:'Michroma', sans-serif;
  background:#070803;
  color:#eee;
  overflow-x:hidden;

  scroll-snap-type:y mandatory;
  scroll-behavior:smooth;
}

section {
  width:100%;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  scroll-snap-align:start;

  position:relative;
  background:#070803;
}

/* ---------------- HERO ---------------- */

#hero {
  background:url('SaulHero5.jpg') center/cover no-repeat;
}

@media (max-width:768px){

  #hero {
    background:url('SAULZIDULKABEJCEK-3.jpg') center/cover no-repeat;
  }
}

/* ---------------- GRID ---------------- */

.folder-grid {
  display:flex;
  flex-direction:column;
  gap:80px;
  align-items:center;
}

.folder-row {
  display:flex;
  gap:80px;
  justify-content:center;
  width:100%;
}

/* ---------------- FOLDERS ---------------- */

.folder {
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  position:relative;
}

.folder-stack {
  position:relative;
  width:144px;
  height:64px;

  transition:
    transform 0.4s ease,
    opacity 0.4s ease;
}

.folder:hover .folder-stack {
  transform:translateY(-3px);
}

.folder-main {
  position:absolute;
  right:0;
  top:0;

  width:88px;
  height:64px;

  background:#e4c97a;
  border-radius:3px;

  box-shadow:2px 2px 0 #000;

  z-index:10;
}

.folder-tab {
  position:absolute;
  top:-8px;
  left:8px;

  width:32px;
  height:12px;

  background:#e4c97a;
  border-radius:2px;
}

.trail {
  position:absolute;
  top:0;

  width:88px;
  height:64px;

  border-radius:3px;
}

.trail.t1 { right:12px; background:#c9a84a; }
.trail.t2 { right:26px; background:#9b5c5c; }
.trail.t3 { right:40px; background:#6e7f52; }
.trail.t4 { right:54px; background:#5a6b8c; }

.folder span {
  margin-top:16px;
  width:144px;

  text-align:center;
  font-size:0.7rem;
  line-height:1.5;
}

.photo-count {
  font-size:0.6rem;
  opacity:0.6;
  margin-top:2px;
}

/* ---------------- CONTACT ---------------- */

.contact-icons {
  display:flex;
  gap:80px;
  justify-content:center;
  align-items:center;
}

.icon svg {
  width:36px;
  height:36px;

  stroke:#eee;
  fill:none;

  stroke-width:1.4;
  stroke-linecap:round;
  stroke-linejoin:round;
}

/* ---------------- MOBILE ---------------- */

@media (max-width:768px){

  .folder-row {
    flex-wrap:wrap;
    gap:40px;
  }
}

<body>

<!-- HERO -->
<section id="hero"></section>

<!-- FOLDERS -->
<section id="folders">

  <div class="folder-grid">

    <div class="folder-row top" id="topRow"></div>

    <div class="folder-row bottom" id="bottomRow"></div>

  </div>

</section>

<!-- CONTACT -->
<section id="contact">

  <div class="contact-icons">

    <!-- Example icon placeholders -->

    <a class="icon" href="#">
      <svg viewBox="0 0 24 24">
        <path d="M4 4h16v16H4z"/>
      </svg>
    </a>

  </div>

</section>

<script>

/* =========================================================
   MAIN FOLDERS
   ========================================================= */

const categories = [

  {
    label:"Yukon 2026",
    page:"yukon-wildlife.html"
  },

  {
    label:"Wildlife + Adventure",
    page:"raw-pnw.html"
  },

  {
    label:"Double Exposures",
    page:"DoubleExpo.html"
  },

  {
    label:"Creatives",
    page:"crystallite.html"
  }
];

const topRow = document.getElementById("topRow");
const bottomRow = document.getElementById("bottomRow");

/* =========================================================
   BUILD FOLDERS
   ========================================================= */

categories.forEach((cat, index) => {

  const folder = document.createElement("div");

  folder.className = "folder";

  folder.innerHTML = `

    <div class="folder-stack">

      <div class="trail t4"></div>
      <div class="trail t3"></div>
      <div class="trail t2"></div>
      <div class="trail t1"></div>

      <div class="folder-main">
        <div class="folder-tab"></div>
      </div>

    </div>

    <span>${cat.label}</span>

    <div class="photo-count">
      Gallery
    </div>

  `;

  folder.onclick = () => {
    location.href = cat.page;
  };

  /* top row first 2 */
  if(index < 2){

    topRow.appendChild(folder);

  } else {

    bottomRow.appendChild(folder);
  }
});
